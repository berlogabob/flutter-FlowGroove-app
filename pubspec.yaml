name: flutter_repsync_app
description: "RepSync - Band repertoire management for cover bands"
publish_to: "none"
version: 0.11.2+80

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0

  # State Management
  flutter_riverpod: ^3.2.1

  # Offline & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # Navigation
  go_router: ^17.1.0

  # Audio
  audioplayers: ^6.5.1

  # PDF & Export
  pdf: ^3.11.2
  printing: ^5.14.2

  # Utilities
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  http: ^1.2.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3

  # CSV processing
  csv: ^7.1.0

  # File picker for import/export
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  share_plus: ^12.0.1

  # Audio Recording (optional)
  flutter_sound: ^9.30.0
  permission_handler: ^12.0.1

dev_dependencies:
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.0
  mockito: ^5.6.3
  mocktail: ^1.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets section
  assets:
    - .env
    - assets/sounds/
